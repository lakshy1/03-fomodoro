<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your FomoDoro account</title>
    <style>
      body {
        margin: 0;
        background: #0b0f1c;
        color: #e7ecff;
        font-family: "Segoe UI", "SF Pro Display", system-ui, -apple-system, sans-serif;
      }
      .container {
        max-width: 560px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .card {
        background: #0f1426;
        border: 1px solid rgba(99, 102, 241, 0.25);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
      }
      .badge {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.18);
        color: #c7d2fe;
        font-weight: 600;
        font-size: 12px;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 22px;
        color: #f8fafc;
      }
      p {
        margin: 0 0 18px;
        font-size: 14px;
        line-height: 1.6;
        color: #cbd5f5;
      }
      .cta {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .footer {
        margin-top: 18px;
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <span class="badge">FomoDoro • Confirm Account</span>
        <h1>Welcome to focus.</h1>
        <p>Confirm your account to unlock your personalized dashboard, leaderboards, and focus analytics.</p>
        <a class="cta" href="{{ .ConfirmationURL }}">Confirm account</a>
        <p class="footer">If you didn’t request this, you can safely ignore this email.</p>
      </div>
    </div>
  </body>
</html>
